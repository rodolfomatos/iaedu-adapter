name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Check syntax all .mjs files
        run: |
          for f in adapter-server.mjs test/*.mjs test_*.mjs; do
            node --check "$f" || exit 1
          done

  test:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Start adapter
        run: |
          export IAEDU_API_KEY=test_key_placeholder
          node adapter-server.mjs &
          ADAPTER_PID=$!
          echo "ADAPTER_PID=$ADAPTER_PID" >> $GITHUB_ENV

          # Wait for server to be ready
          for i in $(seq 1 10); do
            if curl -s http://localhost:4000/health > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done

      - name: Run smoke tests
        run: node --test test/smoke.mjs

      - name: Stop adapter
        if: always()
        run: kill ${{ env.ADAPTER_PID }} 2>/dev/null || true